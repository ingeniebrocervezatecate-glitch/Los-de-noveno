<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTSC Salud — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <a href="index.html" class="auth-back" aria-label="Volver al inicio"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></a>

  <div class="auth-card" role="main">
    <h1 class="auth-card__title">UTSC Salud</h1>
    <p class="auth-card__subtitle">Plataforma de prevención y salud</p>

    <div id="auth-feedback" class="auth-feedback auth-feedback--error hidden" role="alert"></div>

    <form id="login-form" novalidate>
      <input type="email"    id="login-email"    class="auth-input" placeholder="Correo electrónico" autocomplete="email"            required />
      <input type="password" id="login-password" class="auth-input" placeholder="Contraseña"         autocomplete="current-password"  required />
      <button type="submit"  id="login-btn"      class="btn--auth">Ingresar</button>
    </form>

    <div class="auth-divider"><span>o continúa con</span></div>

    <button class="btn--google" id="google-btn" type="button">
      <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="auth-switch">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
